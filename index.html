<!DOCTYPE html>
<html>
<head>
    <title>Чат для Vitalik и Ciba</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
        body { background: #667eea; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .chat { width: 600px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .header { background: #4834d4; color: white; padding: 20px; display: flex; justify-content: space-between; }
        .user { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; }
        .messages { height: 400px; overflow-y: auto; padding: 20px; background: #f5f6fa; }
        .message { margin-bottom: 15px; max-width: 80%; }
        .my-message { margin-left: auto; }
        .my-message .bubble { background: #4834d4; color: white; }
        .friend-message .bubble { background: white; }
        .bubble { padding: 10px 15px; border-radius: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-block; }
        .name { font-size: 12px; color: #666; margin-bottom: 3px; }
        .time { font-size: 10px; color: #999; margin-top: 3px; }
        .input-area { padding: 20px; background: white; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: #4834d4; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; }
        .login { text-align: center; padding: 40px; background: white; border-radius: 20px; }
        .login h2 { margin-bottom: 20px; }
        .login button { margin: 10px; width: 120px; }
    </style>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="app">
        <div class="login">
            <h2>🔐 Кто ты?</h2>
            <button onclick="selectUser('vitalik')">Я Vitalik</button>
            <button onclick="selectUser('ciba')">Я Ciba</button>
        </div>
    </div>

    <script>
        // !!! ВСТАВЬ СВОИ ДАННЫЕ ИЗ FIREBASE !!!
        const firebaseConfig = {
            apiKey: "AIzaSyBvW_WAK_1kqRZP9X5qZxX8X5qZxX8X5qZx",
            authDomain: "vitalik-ciba-chat.firebaseapp.com",
            databaseURL: "https://vitalik-ciba-chat-default-rtdb.firebaseio.com",
            projectId: "vitalik-ciba-chat",
            storageBucket: "vitalik-ciba-chat.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abc123def456"
        };

        // Запускаем Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentUser = null;

        // Функция выбора пользователя
        window.selectUser = function(user) {
            currentUser = user;
            localStorage.setItem('chat_user', user);
            showChat();
            initChat();
        };

        // Показать чат
        function showChat() {
            const isVitalik = currentUser === 'vitalik';
            document.getElementById('app').innerHTML = `
                <div class="chat">
                    <div class="header">
                        <span>💬 Чат Vitalik & Ciba</span>
                        <span class="user">${isVitalik ? '👤 Vitalik' : '👤 Ciba'}</span>
                    </div>
                    <div class="messages" id="messages"></div>
                    <div class="input-area">
                        <input type="text" id="messageInput" placeholder="Напиши сообщение..." 
                               onkeypress="if(event.key==='Enter') sendMessage()">
                        <button onclick="sendMessage()">→</button>
                    </div>
                </div>
            `;
        }

        // Отправка сообщения
        window.sendMessage = function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (text && currentUser) {
                db.ref('messages').push({
                    sender: currentUser,
                    text: text,
                    time: Date.now()
                });
                input.value = '';
            }
        };

        // Слушаем сообщения
        function initChat() {
            db.ref('messages').on('child_added', (data) => {
                const msg = data.val();
                const messagesDiv = document.getElementById('messages');
                if (!messagesDiv) return;
                
                const time = new Date(msg.time).toLocaleTimeString();
                const isMyMessage = msg.sender === currentUser;
                
                messagesDiv.innerHTML += `
                    <div class="message ${isMyMessage ? 'my-message' : 'friend-message'}">
                        <div class="name">${msg.sender === 'vitalik' ? 'Vitalik' : 'Ciba'}</div>
                        <div class="bubble">${msg.text}</div>
                        <div class="time">${time}</div>
                    </div>
                `;
                
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
            
            // Показываем кто онлайн
            db.ref('.info/connected').on('value', (snap) => {
                if (snap.val() && currentUser) {
                    db.ref('users/' + currentUser).set({
                        online: true,
                        lastSeen: Date.now()
                    });
                }
            });
        }

        // Проверяем, заходил ли уже
        const savedUser = localStorage.getItem('chat_user');
        if (savedUser === 'vitalik' || savedUser === 'ciba') {
            selectUser(savedUser);
        }
    </script>
</body>
</html>

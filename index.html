<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат Vitalik и Ciba</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: #4834d4;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-select {
            display: flex;
            gap: 10px;
        }
        
        .user-btn {
            padding: 8px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .user-btn.active {
            background: white;
            color: #4834d4;
            border-color: white;
        }
        
        .messages-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f6fa;
        }
        
        .message {
            margin-bottom: 15px;
            max-width: 70%;
        }
        
        .my-message {
            margin-left: auto;
        }
        
        .message-content {
            padding: 10px 15px;
            border-radius: 18px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            word-break: break-word;
        }
        
        .my-message .message-content {
            background: #4834d4;
            color: white;
        }
        
        .message-info {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        
        .my-message .message-info {
            text-align: right;
        }
        
        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        
        button {
            background: #4834d4;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #3c2bb5;
        }
        
        .hidden {
            display: none;
        }
        
        .welcome-screen {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
        }
        
        .welcome-screen h1 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .welcome-screen button {
            margin: 10px;
            width: 150px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // !!! ТВОИ ДАННЫЕ ИЗ FIREBASE !!!
        const firebaseConfig = {
            apiKey: "AIzaSyCwwFF6s91vt2C6fK-kHT0Cl5B9ziPuWLI",
            authDomain: "tdvdchat.firebaseapp.com",
            databaseURL: "https://tdvdchat-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tdvdchat",
            storageBucket: "tdvdchat.firebasestorage.app",
            messagingSenderId: "760809424572",
            appId: "1:760809424572:web:22c18a87e756fe168832b9",
            measurementId: "G-YSV9B1W5R3"
        };

        // Запускаем Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Основной класс чата
        class Chat {
            constructor() {
                this.currentUser = null;
                this.init();
            }

            init() {
                // Проверяем, есть ли сохраненный пользователь
                const savedUser = localStorage.getItem('chat_user');
                
                if (savedUser === 'vitalik' || savedUser === 'ciba') {
                    // Если есть - входим сразу
                    this.login(savedUser);
                } else {
                    // Если нет - показываем экран входа
                    this.showLoginScreen();
                }
            }

            showLoginScreen() {
                document.getElementById('app').innerHTML = `
                    <div class="welcome-screen">
                        <h1>🔐 Приватный чат</h1>
                        <p>Выбери, кто ты:</p>
                        <div style="margin-top: 30px;">
                            <button onclick="chat.login('vitalik')">Я Vitalik</button>
                            <button onclick="chat.login('ciba')">Я Ciba</button>
                        </div>
                    </div>
                `;
            }

            login(user) {
                this.currentUser = user;
                localStorage.setItem('chat_user', user);
                
                // Сохраняем в Firebase, что пользователь онлайн
                db.ref('users/' + user).set({
                    online: true,
                    lastSeen: Date.now()
                });
                
                // Показываем чат
                this.showChat();
                
                // Начинаем слушать сообщения
                this.listenMessages();
                
                // Обновляем статус онлайн каждые 5 секунд
                setInterval(() => {
                    db.ref('users/' + user).update({
                        online: true,
                        lastSeen: Date.now()
                    });
                }, 5000);
            }

            showChat() {
                const isVitalik = this.currentUser === 'vitalik';
                
                document.getElementById('app').innerHTML = `
                    <div class="chat-container">
                        <div class="header">
                            <div>
                                <span style="font-weight: bold;">💬 Чат Vitalik & Ciba</span>
                            </div>
                            <div class="user-select">
                                <span class="user-btn ${isVitalik ? 'active' : ''}">Vitalik</span>
                                <span class="user-btn ${!isVitalik ? 'active' : ''}">Ciba</span>
                            </div>
                        </div>
                        
                        <div class="messages-area" id="messages"></div>
                        
                        <div class="input-area">
                            <input type="text" id="messageInput" placeholder="Введите сообщение..." 
                                   onkeypress="if(event.key === 'Enter') chat.sendMessage()">
                            <button onclick="chat.sendMessage()">Отправить</button>
                        </div>
                    </div>
                `;
                
                // Загружаем старые сообщения
                this.loadMessages();
            }

            loadMessages() {
                db.ref('messages').once('value', (snapshot) => {
                    const messages = snapshot.val() || {};
                    // Преобразуем объект в массив и сортируем по времени
                    const messagesArray = Object.values(messages).sort((a, b) => a.time - b.time);
                    messagesArray.forEach(msg => {
                        this.displayMessage(msg);
                    });
                });
            }

            listenMessages() {
                db.ref('messages').on('child_added', (snapshot) => {
                    const msg = snapshot.val();
                    // Проверяем, нет ли уже такого сообщения
                    const messagesDiv = document.getElementById('messages');
                    if (messagesDiv) {
                        this.displayMessage(msg);
                    }
                });
            }

            displayMessage(msg) {
                const messagesDiv = document.getElementById('messages');
                if (!messagesDiv) return;
                
                const isMyMessage = msg.sender === this.currentUser;
                const senderName = msg.sender === 'vitalik' ? 'Vitalik' : 'Ciba';
                const time = new Date(msg.time).toLocaleTimeString();
                
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isMyMessage ? 'my-message' : ''}`;
                messageDiv.innerHTML = `
                    <div class="message-info">${senderName}</div>
                    <div class="message-content">${msg.text}</div>
                    <div class="message-time">${time}</div>
                `;
                
                messagesDiv.appendChild(messageDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }

            sendMessage() {
                const input = document.getElementById('messageInput');
                const text = input.value.trim();
                
                if (text && this.currentUser) {
                    db.ref('messages').push({
                        sender: this.currentUser,
                        text: text,
                        time: Date.now()
                    });
                    input.value = '';
                }
            }
        }

        // Создаем глобальный объект чата
        const chat = new Chat();
        window.chat = chat;
    </script>
</body>
</html>
